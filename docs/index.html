<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #111418;
    --surface2: #181c22;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.12);
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --accent:   #00d4aa;
    --red:      #ff4d4d;
    --amber:    #f59e0b;
    --green:    #10b981;
    --blue:     #3b82f6;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCANLINE subtle overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── HEADER ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,12,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .logo-text span {
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  .last-update {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── MAIN ── */
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* ── METRICS BAR ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  @media (max-width: 640px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
  }

  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .metric::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .metric.green::before { background: var(--green); }
  .metric.red::before   { background: var(--red); }
  .metric.amber::before { background: var(--amber); }
  .metric.blue::before  { background: var(--blue); }

  .metric-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .metric-val {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .metric-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.06em;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }

  .filter-btn.active {
    background: rgba(0,212,170,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── CARDS GRID ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  @media (max-width: 400px) {
    .cards { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
  }

  .card.buy   { border-left: 3px solid var(--green); }
  .card.sell  { border-left: 3px solid var(--red); }
  .card.wait  { border-left: 3px solid var(--border2); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .ticker-block {}

  .ticker {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  .ticker-name {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .cat-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
  }

  .price {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }

  .chg {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
  }

  .chg.pos { color: var(--green); }
  .chg.neg { color: var(--red); }

  .indicators {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .ind {
    background: var(--surface2);
    border-radius: 6px;
    padding: 7px 9px;
  }

  .ind-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .ind-val {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  /* SCORE BAR */
  .score-section { margin-bottom: 12px; }

  .score-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .score-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .score-num {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
  }

  .score-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  /* SENTIMENT */
  .sentiment-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .sent-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .sent-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .news-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  /* SIGNAL BADGE */
  .signal {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 5px;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .signal.buy  { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .signal.sell { background: rgba(255,77,77,0.15);  color: var(--red);   border: 1px solid rgba(255,77,77,0.3); }
  .signal.wait { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }

  /* VERDICT */
  .verdict {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  /* ── CHART SECTION ── */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* ── TICKER TAPE ── */
  .tape-wrapper {
    overflow: hidden;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 8px 0;
    margin-bottom: 24px;
    position: relative;
  }

  .tape-wrapper::before,
  .tape-wrapper::after {
    content: '';
    position: absolute;
    top: 0;
    width: 60px;
    height: 100%;
    z-index: 2;
  }

  .tape-wrapper::before {
    left: 0;
    background: linear-gradient(to right, var(--surface), transparent);
  }

  .tape-wrapper::after {
    right: 0;
    background: linear-gradient(to left, var(--surface), transparent);
  }

  .tape-track {
    display: flex;
    gap: 0;
    animation: ticker 30s linear infinite;
    white-space: nowrap;
    width: max-content;
  }

  @keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .tape-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 24px;
    font-family: var(--mono);
    font-size: 12px;
    border-right: 1px solid var(--border);
  }

  .tape-ticker { color: var(--text); font-weight: 500; }
  .tape-price  { color: var(--muted); }
  .tape-chg    { font-size: 11px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 16px;
  }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .error-box {
    background: rgba(255,77,77,0.08);
    border: 1px solid rgba(255,77,77,0.25);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    margin: 40px 0;
  }

  /* ── FOOTER ── */
  .footer {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .main { padding: 16px; }
    .header { padding: 0 16px; }
    .logo-text { display: none; }
    .last-update { display: none; }
    .price { font-size: 18px; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">MI</div>
    <div class="logo-text">MARKET<span>INTEL</span></div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="last-update" id="lastUpdate">—</div>
    <button class="refresh-btn" onclick="loadData()">↻ REFRESH</button>
  </div>
</header>

<!-- Ticker tape -->
<div class="tape-wrapper" id="tapeWrapper" style="display:none;">
  <div class="tape-track" id="tapeTrack"></div>
</div>

<main class="main">
  <div id="metricsBar" class="metrics" style="display:none;"></div>

  <div class="filters" id="filters" style="display:none;">
    <button class="filter-btn active" onclick="filter('all',this)">TOUS</button>
    <button class="filter-btn" onclick="filter('GPU',this)">GPU</button>
    <button class="filter-btn" onclick="filter('AI',this)">IA</button>
    <button class="filter-btn" onclick="filter('Crypto',this)">CRYPTO</button>
    <button class="filter-btn" onclick="filter('ACHETER',this)">▲ ACHETER</button>
    <button class="filter-btn" onclick="filter('VENDRE/ÉVITER',this)">▼ ÉVITER</button>
    <button class="filter-btn" onclick="filter('ATTENDRE',this)">◆ ATTENDRE</button>
  </div>

  <div id="cardsGrid" class="cards"></div>

  <div class="chart-section" id="chartSection" style="display:none;">
    <div class="section-title">Scores composites — 0 à 100</div>
    <div style="position:relative;width:100%;height:220px;">
      <canvas id="scoreChart" role="img" aria-label="Scores composites des actifs"></canvas>
    </div>
  </div>

  <div id="loadingEl" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">CHARGEMENT DES DONNÉES...</div>
  </div>
</main>

<footer class="footer">
  <span>⚠ INFORMATION UNIQUEMENT — PAS DE CONSEIL FINANCIER</span>
  <span id="footerTs">—</span>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let allData = [];
let chartInstance = null;

function signalClass(s) {
  if (!s) return 'wait';
  const u = s.toUpperCase();
  if (u.includes('ACHETER') || u === 'BUY') return 'buy';
  if (u.includes('VENDRE') || u.includes('ÉVITER') || u === 'SELL') return 'sell';
  return 'wait';
}

function signalLabel(s) {
  if (!s) return 'ATTENDRE';
  const u = s.toUpperCase();
  if (u.includes('ACHETER') || u === 'BUY') return '▲ ACHETER';
  if (u.includes('VENDRE') || u.includes('ÉVITER') || u === 'SELL') return '▼ ÉVITER';
  return '◆ ATTENDRE';
}

function scoreColor(v) {
  if (v >= 65) return '#10b981';
  if (v <= 35) return '#ff4d4d';
  return '#f59e0b';
}

function sentColor(s) {
  if (!s) return '#6b7280';
  const u = s.toUpperCase();
  if (u.includes('POSITIF') || u === 'POSITIVE') return '#10b981';
  if (u.includes('NÉGATIF') || u.includes('NEGATIF') || u === 'NEGATIVE') return '#ff4d4d';
  return '#f59e0b';
}

function fmtPrice(p, ticker) {
  if (!p && p !== 0) return '—';
  if (p > 10000) return p.toLocaleString('fr-FR', {maximumFractionDigits: 0});
  if (p > 100)   return p.toFixed(2);
  return p.toFixed(4);
}

function fmtChg(c) {
  if (c === undefined || c === null) return '—';
  const s = c >= 0 ? '+' : '';
  return `${s}${c.toFixed(2)}%`;
}

function buildTicker(data) {
  const wrap = document.getElementById('tapeWrapper');
  const track = document.getElementById('tapeTrack');
  if (!data.length) return;
  wrap.style.display = 'block';
  const items = data.map(d => {
    const c = (d.market?.change_1d ?? 0);
    const col = c >= 0 ? '#10b981' : '#ff4d4d';
    return `<span class="tape-item">
      <span class="tape-ticker">${d.ticker}</span>
      <span class="tape-price">${fmtPrice(d.market?.current_price, d.ticker)}</span>
      <span class="tape-chg" style="color:${col}">${fmtChg(c)}</span>
    </span>`;
  }).join('');
  // Duplicate for seamless loop
  track.innerHTML = items + items;
}

function buildMetrics(data) {
  const bar = document.getElementById('metricsBar');
  bar.style.display = 'grid';
  const buy  = data.filter(d => signalClass(d.score?.signal) === 'buy').length;
  const sell = data.filter(d => signalClass(d.score?.signal) === 'sell').length;
  const wait = data.filter(d => signalClass(d.score?.signal) === 'wait').length;
  const avgScore = data.length
    ? Math.round(data.reduce((a, d) => a + (d.score?.composite ?? 50), 0) / data.length)
    : 0;

  const topBuy  = data.filter(d => signalClass(d.score?.signal) === 'buy')
    .sort((a,b) => (b.score?.composite??0) - (a.score?.composite??0))[0];
  const topSell = data.filter(d => signalClass(d.score?.signal) === 'sell')
    .sort((a,b) => (a.score?.composite??0) - (b.score?.composite??0))[0];

  bar.innerHTML = `
    <div class="metric blue" style="animation-delay:0s">
      <div class="metric-label">ACTIFS SUIVIS</div>
      <div class="metric-val" style="color:#3b82f6">${data.length}</div>
      <div class="metric-sub">GPU · IA · Crypto</div>
    </div>
    <div class="metric green" style="animation-delay:0.1s">
      <div class="metric-label">ACHETER</div>
      <div class="metric-val" style="color:#10b981">${buy}</div>
      <div class="metric-sub">${topBuy ? topBuy.ticker + ' · score ' + topBuy.score?.composite : 'Aucun signal'}</div>
    </div>
    <div class="metric red" style="animation-delay:0.2s">
      <div class="metric-label">ÉVITER</div>
      <div class="metric-val" style="color:#ff4d4d">${sell}</div>
      <div class="metric-sub">${topSell ? topSell.ticker + ' · score ' + topSell.score?.composite : 'Aucun signal'}</div>
    </div>
    <div class="metric amber" style="animation-delay:0.3s">
      <div class="metric-label">SCORE MOYEN</div>
      <div class="metric-val" style="color:${scoreColor(avgScore)}">${avgScore}</div>
      <div class="metric-sub">${wait} en attente</div>
    </div>
  `;
}

function buildCard(d, idx) {
  const sig    = d.score?.signal ?? 'ATTENDRE';
  const sc     = d.score?.composite ?? 50;
  const chg    = d.market?.change_1d ?? 0;
  const price  = d.market?.current_price ?? 0;
  const rsi    = d.market?.rsi ?? 0;
  const vol    = d.market?.volume_ratio ?? 1;
  const trend  = d.market?.trend ?? '';
  const sent   = d.sentiment?.label ?? 'NEUTRE';
  const sentSc = d.sentiment?.score ?? 0;
  const nNews  = d.sentiment?.headlines_used ?? 0;
  const report = d.report ?? '';
  const scClass = signalClass(sig);
  const delay = (idx * 0.05).toFixed(2);
  const trendColor = trend.toUpperCase().includes('HAUSS') ? '#10b981' : '#ff4d4d';

  return `
    <div class="card ${scClass}" style="animation-delay:${delay}s" data-cat="${d.category}" data-signal="${sig.toUpperCase()}">
      <div class="card-header">
        <div class="ticker-block">
          <div class="ticker">${d.ticker}</div>
          <div class="ticker-name">${d.name}</div>
        </div>
        <span class="cat-badge">${d.category}</span>
      </div>

      <div class="price-row">
        <span class="price">${fmtPrice(price, d.ticker)}</span>
        <span class="chg ${chg >= 0 ? 'pos' : 'neg'}">${fmtChg(chg)}</span>
      </div>

      <div class="indicators">
        <div class="ind">
          <div class="ind-label">RSI</div>
          <div class="ind-val" style="color:${rsi > 70 ? '#ff4d4d' : rsi < 30 ? '#10b981' : '#e8eaf0'}">${Math.round(rsi)}</div>
        </div>
        <div class="ind">
          <div class="ind-label">VOLUME</div>
          <div class="ind-val">${vol.toFixed(1)}x</div>
        </div>
        <div class="ind">
          <div class="ind-label">TENDANCE</div>
          <div class="ind-val" style="color:${trendColor};font-size:10px">${trend.slice(0,6).toUpperCase()}</div>
        </div>
      </div>

      <div class="score-section">
        <div class="score-header">
          <span class="score-label">SCORE</span>
          <span class="score-num" style="color:${scoreColor(sc)}">${sc}/100</span>
        </div>
        <div class="score-track">
          <div class="score-fill" style="width:${sc}%;background:${scoreColor(sc)}"></div>
        </div>
      </div>

      <div class="sentiment-row">
        <div class="sent-pill">
          <span class="sent-dot" style="background:${sentColor(sent)}"></span>
          <span style="color:${sentColor(sent)};font-family:var(--mono);font-size:11px">${sent}</span>
          <span style="color:var(--muted);font-family:var(--mono);font-size:11px">(${sentSc >= 0 ? '+' : ''}${sentSc.toFixed(2)})</span>
        </div>
        <span class="news-count">${nNews} NEWS</span>
      </div>

      <div class="signal ${scClass}">${signalLabel(sig)}</div>

      ${report && report !== '⏭ Rapport IA désactivé (mode rapide)' ? `<div class="verdict">${report.replace(/\*\*/g,'').replace(/\n/g,' ')}</div>` : ''}
    </div>
  `;
}

function buildCards(data) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = data.map((d, i) => buildCard(d, i)).join('');
}

function buildChart(data) {
  const section = document.getElementById('chartSection');
  section.style.display = 'block';
  const labels = data.map(d => d.ticker);
  const scores = data.map(d => d.score?.composite ?? 50);
  const colors = scores.map(s => scoreColor(s));

  if (chartInstance) { chartInstance.destroy(); }

  chartInstance = new Chart(document.getElementById('scoreChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: scores,
        backgroundColor: colors.map(c => c + '33'),
        borderColor: colors,
        borderWidth: 1.5,
        borderRadius: 5,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#181c22',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleFont: { family: 'IBM Plex Mono', size: 12 },
          bodyFont:  { family: 'IBM Plex Mono', size: 11 },
          callbacks: {
            label: ctx => ` Score: ${ctx.parsed.y}/100`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#6b7280', font: { family: 'IBM Plex Mono', size: 11 } }
        },
        y: {
          min: 0, max: 100,
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#6b7280',
            font: { family: 'IBM Plex Mono', size: 11 },
            stepSize: 25,
            callback: v => v
          }
        }
      }
    }
  });
}

let currentFilter = 'all';

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let items = allData;
  if (type === 'GPU')    items = allData.filter(d => d.category === 'GPU');
  else if (type === 'AI')   items = allData.filter(d => d.category === 'AI');
  else if (type === 'Crypto') items = allData.filter(d => d.category === 'Crypto');
  else if (type !== 'all') {
    items = allData.filter(d => {
      const s = (d.score?.signal ?? '').toUpperCase();
      const t = type.toUpperCase();
      return s.includes(t) || (t === 'ACHETER' && s === 'BUY') || (t === 'VENDRE/ÉVITER' && s === 'SELL');
    });
  }
  buildCards(items);
}

async function loadData() {
  document.getElementById('loadingEl').style.display = 'flex';
  document.getElementById('cardsGrid').innerHTML = '';
  document.getElementById('chartSection').style.display = 'none';
  document.getElementById('filters').style.display = 'none';
  document.getElementById('metricsBar').style.display = 'none';
  document.getElementById('tapeWrapper').style.display = 'none';

  try {
    const res = await fetch(`results.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (!Array.isArray(data) || !data.length) throw new Error('Données vides');

    allData = data;

    // Timestamp
    const ts = data[0]?.timestamp;
    if (ts) {
      const d = new Date(ts);
      const fmt = d.toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      document.getElementById('lastUpdate').textContent = fmt;
      document.getElementById('footerTs').textContent = `Dernière analyse : ${fmt}`;
    }

    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('filters').style.display = 'flex';

    buildTicker(data);
    buildMetrics(data);
    buildCards(data);
    buildChart(data);

  } catch (err) {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('cardsGrid').innerHTML = `
      <div class="error-box" style="grid-column:1/-1">
        ERREUR DE CHARGEMENT<br>
        <span style="color:var(--muted);font-size:11px;margin-top:6px;display:block">${err.message}</span>
        <span style="color:var(--muted);font-size:10px;margin-top:4px;display:block">Vérifiez que results.json existe dans ce dossier</span>
      </div>`;
  }
}

// Charge au démarrage
loadData();

// Auto-refresh toutes les 5 minutes (si la page est ouverte)
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
