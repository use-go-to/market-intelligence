name: Market Intelligence v2 — Analyse Horaire

on:
  schedule:
    - cron: '0 * * * *'   # Toutes les heures (UTC)
  workflow_dispatch:        # Déclenchement manuel

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Test connexion Ollama
        env:
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
        run: |
          echo "Test connexion Ollama sur $OLLAMA_HOST ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$OLLAMA_HOST/api/tags" 2>/dev/null || echo "000000")
          if [ "$STATUS" = "200" ]; then
            echo "OK Ollama accessible — rapports IA actives"
            echo "AI_ENABLED=true" >> $GITHUB_ENV
          else
            echo "WARNING Ollama non accessible (status $STATUS) — mode sans IA"
            echo "AI_ENABLED=false" >> $GITHUB_ENV
          fi

      - name: Lancer l'analyse
        env:
          NEWS_API_KEY:  ${{ secrets.NEWS_API_KEY }}
          OLLAMA_HOST:   ${{ secrets.OLLAMA_HOST }}
          OLLAMA_MODEL:  ${{ secrets.OLLAMA_MODEL }}
        run: |
          if [ "$AI_ENABLED" = "true" ]; then
            python analyzer.py
          else
            python analyzer.py --no-ai
          fi

      - name: Copier results.json dans docs/
        run: cp results.json docs/results.json

      - name: Commit et push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "chore: analyse $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
