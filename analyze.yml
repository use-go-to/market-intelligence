name: Market Intelligence — Analyse Horaire

on:
  schedule:
    # Toutes les heures (UTC) — adaptable
    - cron: '0 * * * *'
  workflow_dispatch:  # Déclenchement manuel depuis GitHub

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'analyse (sans Ollama — mode rapide)
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python analyzer_cloud.py --no-ai

      - name: Copier results.json dans docs/
        run: cp results.json docs/results.json

      - name: Commit et push results.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "chore: mise à jour analyse $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
